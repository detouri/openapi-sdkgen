openapi: 3.0.3
info:
  title: Users API
  version: 1.0.0
paths:
  /users/{id}:
    get:
      operationId: getUser
      summary: Fetch one user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: includeDetails
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
  /users:
    post:
      operationId: createUser
      summary: Create one user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        manager:
          $ref: "#/components/schemas/User"
        roles:
          type: array
          items:
            type: string
    CreateUserInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        managerId:
          type: string
        role:
          type: string
          enum:
            - admin
            - editor
            - viewer
    ErrorModel:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        code:
          type: integer
